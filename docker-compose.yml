version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ifems-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ifems2026
      POSTGRES_DB: ifems
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - ifems_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ifems_pgdata:
    name: ifems_pgdata
